<svg width="64" height="64" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="blueGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00B4DB;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0083B0;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="greenGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00D4AA;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00A86B;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1" result="coloredBlur"/>
      <feMerge> 
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background circle -->
  <circle cx="32" cy="32" r="32" fill="#1a1a1a"/>
  
  <!-- Car silhouette -->
  <path d="M16 40 Q20 28 28 28 L36 28 Q44 28 48 36 L48 40 Q48 44 44 44 L20 44 Q16 44 16 40 Z" fill="url(#blueGradient)" stroke="none" filter="url(#glow)"/>
  
  <!-- Leaf integrated in car -->
  <path d="M28 28 Q32 20 36 28 Q32 24 28 28" fill="url(#greenGradient)" stroke="none" filter="url(#glow)"/>
  <path d="M30 22 Q32 20 34 22" fill="#00E6B8" stroke="none"/>
</svg>
