<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Offline - Hybrid Tech Auto</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background: linear-gradient(135deg, #003d5c 0%, #0083B0 50%, #00A86B 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      padding: 1rem;
    }
    .container {
      text-align: center;
      max-width: 480px;
      padding: 3rem 2rem;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 1rem;
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.2);
    }
    .icon {
      font-size: 4rem;
      margin-bottom: 1.5rem;
      display: block;
    }
    h1 {
      font-size: 1.75rem;
      font-weight: 700;
      margin-bottom: 0.75rem;
    }
    p {
      font-size: 1rem;
      line-height: 1.6;
      opacity: 0.9;
      margin-bottom: 2rem;
    }
    .btn {
      display: inline-block;
      padding: 0.875rem 2rem;
      background: #00B4DB;
      color: #fff;
      text-decoration: none;
      border-radius: 0.5rem;
      font-weight: 600;
      font-size: 1rem;
      border: none;
      cursor: pointer;
      transition: background 0.2s;
    }
    .btn:hover {
      background: #0083B0;
    }
    .brand {
      margin-top: 2rem;
      font-size: 0.875rem;
      opacity: 0.7;
    }
  </style>
</head>
<body>
  <div class="container">
    <span class="icon" role="img" aria-label="No connection">&#x1F50C;</span>
    <h1>You're Offline</h1>
    <p>
      It looks like you've lost your internet connection.
      Please check your connection and try again.
    </p>
    <button class="btn" onclick="window.location.reload()">Try Again</button>
    <p class="brand">Hybrid Tech Auto</p>
  </div>
</body>
</html>
