<!DOCTYPE html>
<html>
<head>
    <title>Sync Batteries Now</title>
    <script>
        async function syncBatteries() {
            const statusDiv = document.getElementById('status');
            const resultDiv = document.getElementById('result');
            
            try {
                statusDiv.innerHTML = '📡 Leyendo baterías desde localStorage...';
                
                // Leer desde localStorage
                const saved = localStorage.getItem('admin_batteries');
                if (!saved) {
                    throw new Error('No hay baterías en localStorage');
                }
                
                const batteries = JSON.parse(saved);
                statusDiv.innerHTML = `✅ Encontradas ${batteries.length} baterías. Sincronizando...`;
                
                // Enviar a producción
                const response = await fetch('https://hybrid-tech-automotive.vercel.app/api/batteries', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ batteries }),
                });
                
                const data = await response.json();
                
                if (data.success) {
                    resultDiv.innerHTML = `
                        <h2>✅ Sincronización Exitosa!</h2>
                        <p>${batteries.length} baterías sincronizadas a producción.</p>
                        <p><a href="https://hybrid-tech-automotive.vercel.app/batteries" target="_blank">Ver en producción</a></p>
                    `;
                    resultDiv.style.color = 'green';
                } else {
                    throw new Error(data.error || 'Error desconocido');
                }
            } catch (error) {
                resultDiv.innerHTML = `<h2>❌ Error</h2><p>${error.message}</p>`;
                resultDiv.style.color = 'red';
            }
        }
        
        window.onload = syncBatteries;
    </script>
</head>
<body style="font-family: Arial; padding: 20px; max-width: 600px; margin: 0 auto;">
    <h1>🔄 Sincronización Automática de Baterías</h1>
    <div id="status">Iniciando...</div>
    <div id="result" style="margin-top: 20px; padding: 10px; border: 1px solid #ccc; border-radius: 5px;"></div>
</body>
</html>
